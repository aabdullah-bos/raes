# Routes the RAES execution loop to authoritative project artifacts.
# Config points to truth. Config does not store truth.
# Provider and model are resolved from environment, not from this file.

project:
  name: raes-init

sources:
  build_intent: docs/prd.md

  system_constraints: docs/system.md

  next_slice:
    path: docs/pipeline.md
    selection_rule: first_unchecked_slice

  durable_decisions: docs/decisions.md

  execution_guidance: docs/execution-guidance.md

  validation: docs/validation.md

  
